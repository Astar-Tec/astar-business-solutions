<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Astar Technologies">
  <title>Astar Technologies</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15161A"/>
      <stop offset="100%" stop-color="#0A0B0E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="55%" stop-color="#F5B400"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Circular seal -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>

  <!-- A graph edges -->
  <g stroke="#FFFFFF" stroke-width="26" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <line x1="144" y1="384" x2="256" y2="144"/>
    <line x1="256" y1="144" x2="368" y2="384"/>
    <line x1="188" y1="288" x2="324" y2="288"/>
  </g>

  <!-- Foot nodes -->
  <g fill="#FFFFFF">
    <rect x="124" y="364" width="40" height="40"/>
    <rect x="348" y="364" width="40" height="40"/>
  </g>

  <!-- Goal node: large gold A* star -->
  <g transform="translate(256 144)">
    <circle r="88" fill="url(#glow)"/>
    <circle r="76" fill="none" stroke="url(#gold)" stroke-width="5" opacity="0.7"/>
    <path d="M0 -84 L17.6 -17.6 L84 0 L17.6 17.6 L0 84 L-17.6 17.6 L-84 0 L-17.6 -17.6 Z"
          fill="url(#gold)" stroke="#92400E" stroke-width="2" stroke-linejoin="miter"/>
    <circle r="11" fill="#15161A"/>
  </g>
</svg>
